<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mosaic Focus Timer</title>
    <style>
        :root {
            --bg-color: #000;
            --cell-default: #0a0a0a;
        }

        body, html {
            margin: 0; padding: 0; 
            /* iPhone Safariのツールバー変動に対応する最新の高さ指定 */
            height: 100vh;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden; 
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white; 
            user-select: none;
            position: fixed; /* スクロールを完全に禁止 */
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(6, 1fr);
            width: 100%;
            height: 100%;
            gap: 1px;
            background-color: #000;
            box-sizing: border-box;
            /* iPhoneの上下セーフエリア（ノッチやホームバー）を考慮した内側の余白 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .cell {
            background-color: var(--cell-default);
            display: flex;
            justify-content: center;
            align-items: center;
            /* 数字が隣と重ならないよう、かつ高さも考慮したレスポンシブサイズ */
            font-size: min(8vw, 10dvh); 
            font-weight: 900;
            color: transparent;
            transition: background-color 0.4s, color 0.3s;
            line-height: 1;
        }

        .cell.active { color: white; }

        #ui-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            text-align: center;
            width: 100%;
        }

        h1 {
            font-size: clamp(3rem, 15vw, 10rem);
            margin: 0; font-weight: 100; opacity: 0.1;
            letter-spacing: 0.5rem;
            color: #fff;
        }

        /* 休憩モードのスタイル */
        .is-break { background-color: #001a0d; }
        .is-break h1 { color: #00ff88; opacity: 0.2; }

        .info-panel {
            position: fixed;
            /* ホームバーに被らないようenvを使用 */
            bottom: calc(env(safe-area-inset-bottom) + 10px);
            z-index: 20;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        #left-info { left: 10px; }
        #right-info { right: 10px; }
    </style>
</head>
<body>
    <div id="grid"></div>
    <div id="ui-overlay"><h1 id="main-label">FOCUS</h1></div>
    <div id="left-info" class="info-panel">READY</div>
    <div id="right-info" class="info-panel">TAP TO START</div>

    <script>
        const grid = document.getElementById('grid');
        const mainLabel = document.getElementById('main-label');
        const leftInfo = document.getElementById('left-info');
        const rightInfo = document.getElementById('right-info');
        
        let totalSeconds = 0;
        let isBreak = false;
        let timerInterval = null;
        let cells = [];

        function createGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = (e) => {
                    if (!timerInterval) startTimer();
                    else if (isBreak && cell.classList.contains('active')) {
                        window.open(`https://www.amazon.co.jp/s?k=${i+1}&tag=mft041-22`, '_blank');
                    }
                };
                grid.appendChild(cell);
                cells.push(cell);
            }
        }

        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                const limit = isBreak ? 300 : 1500;
                const sec = totalSeconds % 60;

                if (sec === 0 && totalSeconds !== 0) {
                    cells.forEach(c => { c.innerText = ''; c.style.backgroundColor = ''; c.classList.remove('active'); });
                }

                if (totalSeconds >= limit) {
                    isBreak = !isBreak;
                    totalSeconds = 0;
                    document.body.classList.toggle('is-break', isBreak);
                    mainLabel.innerText = isBreak ? "REST" : "FOCUS";
                    return;
                }

                const c = cells[sec];
                c.classList.add('active');
                c.innerText = sec + 1;
                c.style.backgroundColor = isBreak ? `hsl(${Math.random()*60+130},70%,40%)` : `hsl(${Math.random()*40+195},70%,45%)`;
                
                totalSeconds++;
                updateUI();
            }, 1000);
        }

        function updateUI() {
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            leftInfo.innerText = isBreak ? "REST MODE" : "FOCUS MODE";
            rightInfo.innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }

        createGrid();
        // 最初のタップでタイマー開始
        window.addEventListener('click', (e) => {
            if(!timerInterval && !e.target.classList.contains('cell')) startTimer();
        }, { once: false });
    </script>
</body>
</html>
