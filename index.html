<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Mosaic Focus Timer</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: #000;
            font-family: 'Inter', sans-serif;
        }

        /* グリッドコンテナ */
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            grid-auto-rows: minmax(80px, 1fr);
            width: 100vw;
            height: 100vh;
            gap: 2px; /* 正方形の隙間 */
        }

        .cell {
            width: 100%;
            height: 100%;
            transition: background-color 2s ease; /* 色の変化を滑らかに */
            background-color: #111;
        }

        #ui {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            pointer-events: none; /* UIの下のクリックを通すため */
            z-index: 100;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 1rem;
            font-weight: 100;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .clickable-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="grid"></div>
    
    <div id="ui">
        <h1 id="label">FOCUS</h1>
        <p id="status">Click anywhere to start</p>
    </div>

    <div class="clickable-area" onclick="toggleTimer()"></div>

    <script>
        const grid = document.getElementById('grid');
        const label = document.getElementById('label');
        const status = document.getElementById('status');
        
        let isRunning = false;
        let mode = 'FOCUS';
        let cells = [];

        // 1. 画面いっぱいに正方形を生成
        function createGrid() {
            grid.innerHTML = '';
            const cellWidth = 80;
            const columns = Math.ceil(window.innerWidth / cellWidth);
            const rows = Math.ceil(window.innerHeight / cellWidth);
            const totalCells = columns * rows;

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                grid.appendChild(cell);
                cells.push(cell);
            }
        }

        // 2. セルの色をランダムに変える関数
        function updateCells() {
            cells.forEach(cell => {
                // 走っている時だけランダムに色を変える
                if (isRunning) {
                    // 10%の確率でそのセルの色を更新（パラパラ感を出す）
                    if (Math.random() > 0.8) {
                        const baseHue = mode === 'FOCUS' ? 200 : 120; // 集中は青系、休憩は緑系
                        const h = baseHue + (Math.random() * 60 - 30); // 色相を散らす
                        const s = 40 + (Math.random() * 40);
                        const l = 10 + (Math.random() * 30);
                        cell.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;
                    }
                } else {
                    // 停止中は暗いグレーに
                    cell.style.backgroundColor = '#111';
                }
            });
        }

        function toggleTimer() {
            isRunning = !isRunning;
            status.innerText = isRunning ? "Deep in the grid..." : "Paused";
            if(!isRunning) updateCells(); // 停止時にリセット
        }

        // 初期化
        createGrid();
        window.addEventListener('resize', createGrid);

        // 1秒ごとにセルを更新
        setInterval(updateCells, 1000);

    </script>
</body>
</html>
